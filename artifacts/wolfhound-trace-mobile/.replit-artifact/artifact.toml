kind = "mobile"
previewPath = "/wolfhound-trace-mobile/"
title = "Wolfhound Trace Mobile"
version = "1.0.0"
id = "artifacts/wolfhound-trace-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/wolfhound-trace-mobile/" ]
localPort = 23607

[services.development]
run = "pnpm --filter @workspace/wolfhound-trace-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wolfhound-trace-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/wolfhound-trace-mobile", "run", "serve" ]

[services.env]
PORT = "23607"
BASE_PATH = "/wolfhound-trace-mobile/"
